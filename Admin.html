<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Management System - Admin Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); overflow: hidden; }
        .header { padding: 30px; text-align: center; color: white; }
        .content { padding: 30px; }
        
        /* LOGIN STYLES */
        .login-container { max-width: 500px; margin: 50px auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .login-container h1 { color: #333; margin-bottom: 30px; text-align: center; }
        .login-form input { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; }
        .login-form input:focus { outline: none; border-color: #667eea; }
        .login-form button { width: 100%; padding: 12px; background: #f44336; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 16px; }
        .login-form button:hover { background: #d32f2f; }
        .login-error { color: #d32f2f; text-align: center; margin-bottom: 15px; font-weight: 600; }
        
        /* COMMON STYLES */
        .hidden { display: none !important; }
        .section { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .section h2 { color: #333; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        th, td { padding: 10px; text-align: left; border: 1px solid #ddd; }
        th { background: #f44336; color: white; }
        tr:nth-child(even) { background: #f5f5f5; }
        input[type="text"], input[type="email"], input[type="number"], input[type="password"], select, textarea { 
            padding: 10px; width: 100%; border: 1px solid #ddd; border-radius: 5px; margin: 5px 0; font-size: 13px;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #f44336; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .btn-primary { background: #f44336; color: white; }
        .btn-primary:hover { background: #d32f2f; }
        .btn-success { background: #4CAF50; color: white; }
        .btn-success:hover { background: #45a049; }
        .btn-danger { background: #f44336; color: white; }
        .btn-danger:hover { background: #d32f2f; }
        .btn-secondary { background: #999; color: white; }
        .btn-secondary:hover { background: #777; }
        .alert { padding: 12px 15px; border-radius: 5px; margin-bottom: 15px; }
        .alert-success { background: #d4edda; color: #155724; border-left: 4px solid #28a745; }
        .alert-error { background: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ddd; flex-wrap: wrap; }
        .tab-btn { padding: 10px 20px; background: none; border: none; cursor: pointer; font-weight: 600; color: #666; border-bottom: 3px solid transparent; transition: all 0.3s; }
        .tab-btn.active { color: #f44336; border-bottom-color: #f44336; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin: 20px 0; }
        .stat-card { background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%); color: white; padding: 20px; border-radius: 8px; text-align: center; }
        .stat-number { font-size: 24px; font-weight: bold; }
        .stat-label { font-size: 11px; opacity: 0.9; margin-top: 5px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } }
        .top-bar { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div id="loginScreen">
        <div class="login-container">
            <h1>🔐 Admin Login</h1>
            <div id="loginError" class="login-error hidden"></div>
            <div class="login-form">
                <input type="password" id="adminPassword" placeholder="Enter Admin Password" autocomplete="off">
                <button onclick="adminLogin()">Login</button> 
            </div>
        </div>
    </div>

    <!-- ADMIN PORTAL -->
    <div id="adminPortal" class="hidden">
        <div class="container">
            <div class="header" style="background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);">
                <div class="top-bar">
                    <h1>👨‍💼 Admin Portal</h1>
                    <button class="btn btn-secondary" onclick="adminLogout()">Logout</button>
                </div>
            </div>
            <div class="content">
                <div id="adminAlert" class="alert hidden"></div>
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchAdminTab('students')">👥 Students</button>
                    <button class="tab-btn" onclick="switchAdminTab('marks')">📊 Marks</button>
                    <button class="tab-btn" onclick="switchAdminTab('stats')">📈 Statistics</button>
                    <button class="tab-btn" onclick="switchAdminTab('settings')">⚙️ Settings</button>
                </div>

                <!-- STUDENTS TAB -->
                <div id="adminStudents">
                    <div class="section">
                        <h2>Add New Student</h2>
                        <div class="form-row">
                            <input type="text" id="studentName" placeholder="Full Name">
                            <input type="number" id="studentClass" placeholder="Class (1-12)" min="1" max="12">
                        </div>
                        <div class="form-row">
                            <input type="number" id="studentRoll" placeholder="Roll Number" min="1">
                            <button class="btn btn-primary" onclick="addStudent()">Add Student</button>
                        </div>
                    </div>

                    <div class="section">
                        <h2>All Students</h2>
                        <div style="overflow-x: auto;">
                            <table id="studentsTable">
                                <thead>
                                    <tr>
                                        <th>ID</th><th>Name</th><th>Class</th><th>Roll</th><th>Action</th>
                                    </tr>
                                </thead>
                                <tbody id="studentsList"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- MARKS TAB -->
                <div id="adminMarks" class="hidden">
                    <div class="section">
                        <h2>Edit Student Marks</h2>
                        <select id="adminClassSelect" onchange="loadAdminMarks()" style="max-width: 200px;">
                            <option value="">Select Class</option>
                            <option value="1">Class 1</option><option value="2">Class 2</option>
                            <option value="3">Class 3</option><option value="4">Class 4</option>
                            <option value="5">Class 5</option><option value="6">Class 6</option>
                            <option value="7">Class 7</option><option value="8">Class 8</option>
                            <option value="9">Class 9</option><option value="10">Class 10</option>
                            <option value="11">Class 11</option><option value="12">Class 12</option>
                        </select>
                    </div>

                    <div class="section" style="overflow-x: auto;">
                        <table id="adminMarksTable">
                            <thead>
                                <tr><th>ID</th><th>Name</th><th>S1</th><th>S2</th><th>S3</th><th>S4</th><th>S5</th><th>S6</th><th>S7</th><th>Total</th></tr>
                            </thead>
                            <tbody id="adminMarksList"></tbody>
                        </table>
                        <button class="btn btn-success" onclick="saveAdminMarks()" style="margin-top: 15px;">Save Marks</button>
                    </div>
                </div>

                <!-- STATS TAB -->
                <div id="adminStats" class="hidden">
                    <div class="section">
                        <h2>📊 System Statistics</h2>
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-number" id="totalStudentsStats">0</div>
                                <div class="stat-label">Total Students</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number" id="totalClassesStats">0</div>
                                <div class="stat-label">Classes in Use</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number" id="totalPassStats">0</div>
                                <div class="stat-label">Passed Students</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number" id="totalFailStats">0</div>
                                <div class="stat-label">Failed Students</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- SETTINGS TAB -->
                <div id="adminSettings" class="hidden">
                    <div class="section">
                        <h2>⚙️ Settings</h2>
                        <button class="btn btn-success" onclick="downloadData()" style="margin-bottom: 10px;">📥 Export Data to JSON</button>
                        <button class="btn btn-primary" onclick="document.getElementById('importFile').click()" style="margin-bottom: 10px;">📤 Import Data from JSON</button>
                        <input type="file" id="importFile" accept=".json" onchange="importData()" style="display: none;">
                        <button class="btn btn-danger" onclick="clearAllData()" style="margin-bottom: 10px;">🗑️ Clear All Data</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allStudents = [];
        let adminLoggedIn = false;

        function adminLogin() {
            const password = document.getElementById("adminPassword").value;
            
            if (password === "admin123") {
                adminLoggedIn = true;
                document.getElementById("loginScreen").classList.add("hidden");
                document.getElementById("adminPortal").classList.remove("hidden");
                loadStudents();
                listStudents();
                showAlert("✓ Logged in successfully!", "success", "admin");
            } else {
                document.getElementById("loginError").textContent = "❌ Incorrect password!";
                document.getElementById("loginError").classList.remove("hidden");
                setTimeout(() => {
                    document.getElementById("loginError").classList.add("hidden");
                }, 3000);
            }
            document.getElementById("adminPassword").value = "";
        }

        function adminLogout() {
            if (confirm("Are you sure you want to logout?")) {
                adminLoggedIn = false;
                document.getElementById("adminPortal").classList.add("hidden");
                document.getElementById("loginScreen").classList.remove("hidden");
                document.getElementById("adminPassword").value = "";
            }
        }

        function loadStudents() {
            const data = localStorage.getItem("studentDatabase");
            allStudents = data ? JSON.parse(data) : [];
        }

        function saveStudents() {
            localStorage.setItem("studentDatabase", JSON.stringify(allStudents));
        }

        function showAlert(msg, type, portalType) {
            const alertEl = document.getElementById(portalType + "Alert");
            if (!alertEl) return;
            alertEl.textContent = msg;
            alertEl.className = "alert alert-" + type;
            alertEl.classList.remove("hidden");
            setTimeout(() => alertEl.classList.add("hidden"), 3000);
        }

        function addStudent() {
            const name = document.getElementById("studentName").value.trim();
            const cls = document.getElementById("studentClass").value;
            const roll = document.getElementById("studentRoll").value;

            if (!name || !cls || !roll) {
                showAlert("❌ Please fill all fields!", "error", "admin");
                return;
            }

            const id = "S" + (allStudents.length + 1).toString().padStart(3, "0");
            allStudents.push({
                id, name, class: cls, roll, marks: [0, 0, 0, 0, 0, 0, 0]
            });

            saveStudents();
            listStudents();
            document.getElementById("studentName").value = "";
            document.getElementById("studentClass").value = "";
            document.getElementById("studentRoll").value = "";
            showAlert("✅ Student added successfully!", "success", "admin");
        }






        function deleteStudent(id) {
            if (confirm("Are you sure you want to delete this student?")) {
                allStudents = allStudents.filter(s => s.id !== id);
                saveStudents();
                listStudents();
                showAlert("✅ Student deleted!", "success", "admin");
            }
        }


        function listStudents() {
            const tbody = document.getElementById("studentsList");
            tbody.innerHTML = "";
            if (allStudents.length === 0) {
                tbody.innerHTML = "<tr><td colspan='5' style='text-align: center; padding: 20px; color: #999;'>No students added yet</td></tr>";
                return;
            }
            allStudents.forEach(s => {
                tbody.innerHTML += `<tr>
                    <td>${s.id}</td><td>${s.name}</td><td>${s.class}</td><td>${s.roll}</td>
                    <td><button class="btn btn-danger" onclick="deleteStudent('${s.id}')">Delete</button></td>
                </tr>`;
            });
        }

        
        function switchAdminTab(tab) {
            document.getElementById("adminStudents").classList.add("hidden");
            document.getElementById("adminMarks").classList.add("hidden");
            document.getElementById("adminStats").classList.add("hidden");
            document.getElementById("adminSettings").classList.add("hidden");
            document.getElementById("admin" + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.remove("hidden");

            document.querySelectorAll("#adminPortal .tab-btn").forEach(b => b.classList.remove("active"));
            event.target.classList.add("active");

            if (tab === "stats") updateAdminStats();
            if (tab === "students") listStudents();
        }

        function loadAdminMarks() {
            const cls = document.getElementById("adminClassSelect").value;
            if (!cls) return;

            const classStudents = allStudents.filter(s => s.class == cls);
            const tbody = document.getElementById("adminMarksList");
            tbody.innerHTML = "";

            if (classStudents.length === 0) {
                tbody.innerHTML = "<tr><td colspan='10' style='text-align: center; padding: 20px; color: #999;'>No students in this class</td></tr>";
                return;
            }

            classStudents.forEach(s => {
                const total = s.marks.reduce((a, b) => a + b, 0);
                const idx = allStudents.indexOf(s);
                let html = `<tr><td>${s.id}</td><td>${s.name}</td>`;
                s.marks.forEach((m, i) => {
                    html += `<td><input type="number" value="${m}" min="0" max="100" data-idx="${idx}" data-sub="${i}" style="width: 50px;"></td>`;
                });
                html += `<td style="font-weight: bold;">${total}</td></tr>`;
                tbody.innerHTML += html;
            });
        }

        function saveAdminMarks() {
            const inputs = document.querySelectorAll("#adminMarksList input");
            inputs.forEach(inp => {
                const idx = parseInt(inp.getAttribute("data-idx"));
                const sub = parseInt(inp.getAttribute("data-sub"));
                allStudents[idx].marks[sub] = parseInt(inp.value) || 0;
            });
            saveStudents();
            loadAdminMarks();
            showAlert("✅ Marks saved successfully!", "success", "admin");
        }

        function updateAdminStats() {
            document.getElementById("totalStudentsStats").textContent = allStudents.length;
            const classes = new Set(allStudents.map(s => s.class));
            document.getElementById("totalClassesStats").textContent = classes.size;
            const passed = allStudents.filter(s => s.marks.reduce((a, b) => a + b) >= 50).length;
            document.getElementById("totalPassStats").textContent = passed;
            document.getElementById("totalFailStats").textContent = allStudents.length - passed;
        }

        function downloadData() {
            const dataStr = JSON.stringify(allStudents, null, 2);
            const dataBlob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement("a");
            link.href = url;
            link.download = "student-data-" + new Date().getTime() + ".json";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showAlert("✅ Data exported successfully!", "success", "admin");
        }

        function importData() {
            const file = document.getElementById("importFile").files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        allStudents = imported;
                        saveStudents();
                        listStudents();
                        showAlert("✅ Data imported successfully!", "success", "admin");
                    } else {
                        showAlert("❌ Invalid JSON format!", "error", "admin");
                    }
                } catch (err) {
                    showAlert("❌ Error reading file!", "error", "admin");
                }
            };
            reader.readAsText(file);
            document.getElementById("importFile").value = "";
        }

        function clearAllData() {
            if (confirm("⚠️ Are you sure? This will delete ALL student data!")) {
                allStudents = [];
                saveStudents();
                listStudents();
                showAlert("✅ All data cleared!", "success", "admin");
            }
        }

        window.onload = () => {
            loadStudents();
            document.getElementById("adminPassword").focus();
        };
    </script>
</body>
</html>
