<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Management System - Teacher Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); overflow: hidden; }
        .header { padding: 30px; text-align: center; color: white; }
        .content { padding: 30px; }
        
        /* LOGIN STYLES */
        .login-container { max-width: 500px; margin: 50px auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .login-container h1 { color: #333; margin-bottom: 30px; text-align: center; }
        .login-form input { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; }
        .login-form input:focus { outline: none; border-color: #667eea; }
        .login-form button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 16px; }
        .login-form button:hover { background: #555dcf; }
        .login-error { color: #d32f2f; text-align: center; margin-bottom: 15px; font-weight: 600; }
        
        /* COMMON STYLES */
        .hidden { display: none !important; }
        .section { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .section h2 { color: #333; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        th, td { padding: 10px; text-align: left; border: 1px solid #ddd; }
        th { background: #667eea; color: white; }
        tr:nth-child(even) { background: #f5f5f5; }
        input[type="text"], input[type="email"], input[type="number"], input[type="password"], select, textarea { 
            padding: 10px; width: 100%; border: 1px solid #ddd; border-radius: 5px; margin: 5px 0; font-size: 13px;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #667eea; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #555dcf; }
        .btn-success { background: #4CAF50; color: white; }
        .btn-success:hover { background: #45a049; }
        .btn-secondary { background: #999; color: white; }
        .btn-secondary:hover { background: #777; }
        .alert { padding: 12px 15px; border-radius: 5px; margin-bottom: 15px; }
        .alert-success { background: #d4edda; color: #155724; border-left: 4px solid #28a745; }
        .alert-error { background: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ddd; flex-wrap: wrap; }
        .tab-btn { padding: 10px 20px; background: none; border: none; cursor: pointer; font-weight: 600; color: #666; border-bottom: 3px solid transparent; transition: all 0.3s; }
        .tab-btn.active { color: #667eea; border-bottom-color: #667eea; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin: 20px 0; }
        .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 8px; text-align: center; }
        .stat-number { font-size: 24px; font-weight: bold; }
        .stat-label { font-size: 11px; opacity: 0.9; margin-top: 5px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; }
        #1212 { font-size: 50px; }
    </style>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div id="loginScreen">
        <div class="login-container">
            <h1>👨‍🏫 Teacher Login</h1>
            <div id="loginError" class="login-error hidden"></div>
            <div class="login-form">
                <input type="text" id="teacherId" placeholder="Teacher ID (T001, T002, T003)" autocomplete="off">
                <input type="password" id="teacherPassword" placeholder="Password" autocomplete="off">
                <button onclick="teacherLogin()">Login</button>
            </div>
        </div>
    </div>

    <!-- TEACHER PORTAL -->
    <div id="teacherPortal" class="hidden">
        <div class="container">
            <div class="header" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                <div class="top-bar">
                    <div>
                        <h1>👨‍🏫 Teacher Portal</h1>
                        <p id="teacherInfo" style="margin-top: 5px; opacity: 0.9;"></p>
                    </div>
                    <button class="btn btn-secondary" onclick="teacherLogout()">Logout</button>
                </div>
            </div>
            <div class="content">
                <div id="teacherAlert" class="alert hidden"></div>
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTeacherTab('marks')">📈 Marks</button>
                    <button class="tab-btn" onclick="switchTeacherTab('timetable')">📅 Timetable</button>
                    <button class="tab-btn" onclick="switchTeacherTab('dashboard')">📊 Dashboard</button>
                </div>

                <!-- MARKS TAB -->
                <div id="teacherMarksTab">
                    <div class="section">
                        <h2>Select Your Class</h2>
                        <select id="teacherClassSelect" onchange="loadTeacherMarks()" style="max-width: 200px;">
                            <option value="">Select Class</option>
                            <option value="1">Class 1</option><option value="2">Class 2</option>
                            <option value="3">Class 3</option><option value="4">Class 4</option>
                            <option value="5">Class 5</option><option value="6">Class 6</option>
                            <option value="7">Class 7</option><option value="8">Class 8</option>
                            <option value="9">Class 9</option><option value="10">Class 10</option>
                            <option value="11">Class 11</option><option value="12">Class 12</option>
                        </select>
                    </div>

                    <div class="section" style="overflow-x: auto;">
                        <h2>Edit Marks - 7 Subjects (0-100)</h2>
                        <table id="teacherMarksTable">
                            <thead>
                                <tr><th id="1212">ID</th><th id="1212">Name</th><th id="1212">English</th><th id="1212">Science</th><th id="1212">Social</th><th id="1212">Hindi</th><th id="1212">Malayalam</th><th id="1212">Computer</th><th id="1212">Mathematics</th><th>Total</th><th>Avg</th></tr>
                            </thead>
                            <tbody id="teacherMarksList"></tbody>
                        </table>
                        <button class="btn btn-success" onclick="saveTeacherMarks()" style="margin-top: 15px;">Save Marks</button>
                    </div>
                </div>

                <!-- TIMETABLE TAB -->
                <div id="teacherTimetableTab" class="hidden">
                    <div class="section">
                        <h2>📅 Class Timetable</h2>
                        <table id="timetableTable">
                            <thead>
                                <tr><th>Period</th><th>Time</th><th>Subject</th><th>Room</th></tr>
                            </thead>
                            <tbody id="timetableBody"></tbody>
                        </table>
                    </div>
                </div>

                <!-- DASHBOARD TAB -->
                <div id="teacherDashboardTab" class="hidden">
                    <div class="section">
                        <h2>📊 Class Performance Dashboard</h2>
                        <div class="stats-grid" id="teacherStats"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'i') {
    e.preventDefault(); // Prevent default action (open DevTools)
  }
});

          // Disable right-click context menu
  document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
  });

  function isCtrlShiftKey(e, key) {
    return e.ctrlKey && e.shiftKey && e.key.toUpperCase() === key;
  }

  document.addEventListener('keydown', function(e) {
    // Disable F12
    if (e.key === "F12") {
      e.preventDefault();
    }
    // Disable Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+Shift+C
    if (isCtrlShiftKey(e, "I") || isCtrlShiftKey(e, "J") || isCtrlShiftKey(e, "C")) {
      e.preventDefault();
    }
    // Disable Ctrl+U
    if (e.ctrlKey && e.key.toUpperCase() === "U") {
      e.preventDefault();
    }
  });
         window.addEventListener('load', function () {
      document.addEventListener('contextmenu', function (event) {
        event.preventDefault();               // Stop the default right-click menu
        alert('You are not allowed to do that'); // Show your message
      });
    });
        let allStudents = [];
        let currentTeacher = null;

        const teachers = {
            "T001": { pass: "pass123", name: "Mr. Smith", subject: "Mathematics" },
            "T002": { pass: "pass456", name: "Ms. Johnson", subject: "English" },
            "T003": { pass: "pass789", name: "Mr. Brown", subject: "Science" }
        };

        const timetable = [
            { period: "1", time: "09:00-10:00", subject: "English", room: "A1" },
            { period: "2", time: "10:00-11:00", subject: "Math", room: "B1" },
            { period: "Break", time: "11:00-11:30", subject: "Recess", room: "-" },
            { period: "3", time: "11:30-12:30", subject: "Science", room: "Lab" },
            { period: "4", time: "12:30-01:30", subject: "History", room: "C1" },
            { period: "Lunch", time: "01:30-02:00", subject: "Lunch", room: "-" },
            { period: "5", time: "02:00-03:00", subject: "Computer", room: "Lab" }
        ];

        function loadStudents() {
            const data = localStorage.getItem("studentDatabase");
            allStudents = data ? JSON.parse(data) : [];
        }

        function saveStudents() {
            localStorage.setItem("studentDatabase", JSON.stringify(allStudents));
        }

        function showAlert(msg, type, portalType) {
            const alertEl = document.getElementById(portalType + "Alert");
            if (!alertEl) return;
            alertEl.textContent = msg;
            alertEl.className = "alert alert-" + type;
            alertEl.classList.remove("hidden");
            setTimeout(() => alertEl.classList.add("hidden"), 3000);
        }

        function teacherLogin() {
            const id = document.getElementById("teacherId").value.toUpperCase().trim();
            const pass = document.getElementById("teacherPassword").value;

            if (!teachers[id] || teachers[id].pass !== pass) {
                document.getElementById("loginError").textContent = "❌ Invalid credentials!";
                document.getElementById("loginError").classList.remove("hidden");
                setTimeout(() => {
                    document.getElementById("loginError").classList.add("hidden");
                }, 3000);
                return;
            }

            currentTeacher = { id, ...teachers[id] };
            loadStudents();
            document.getElementById("loginScreen").classList.add("hidden");
            document.getElementById("teacherPortal").classList.remove("hidden");
            document.getElementById("teacherInfo").textContent = `${currentTeacher.name} - ${currentTeacher.subject}`;
            loadTimetable();
            showAlert("✅ Logged in successfully!", "success", "teacher");
        }

        function teacherLogout() {
            if (confirm("Are you sure you want to logout?")) {
                currentTeacher = null;
                document.getElementById("teacherPortal").classList.add("hidden");
                document.getElementById("loginScreen").classList.remove("hidden");
                document.getElementById("teacherId").value = "";
                document.getElementById("teacherPassword").value = "";
            }
        }

        function switchTeacherTab(tab) {
            document.getElementById("teacherMarksTab").classList.add("hidden");
            document.getElementById("teacherTimetableTab").classList.add("hidden");
            document.getElementById("teacherDashboardTab").classList.add("hidden");
            document.getElementById("teacher" + tab.charAt(0).toUpperCase() + tab.slice(1) + "Tab").classList.remove("hidden");

            document.querySelectorAll("#teacherPortal .tab-btn").forEach(b => b.classList.remove("active"));
            event.target.classList.add("active");

            if (tab === "dashboard") updateTeacherDashboard();
        }

        function loadTeacherMarks() {
            const cls = document.getElementById("teacherClassSelect").value;
            if (!cls) return;

            const classStudents = allStudents.filter(s => s.class == cls);
            const tbody = document.getElementById("teacherMarksList");
            tbody.innerHTML = "";

            if (classStudents.length === 0) {
                tbody.innerHTML = "<tr><td colspan='11' style='text-align: center; padding: 20px; color: #999;'>No students in this class</td></tr>";
                return;
            }

            classStudents.forEach(s => {
                const total = s.marks.reduce((a, b) => a + b, 0);
                const avg = (total / 7).toFixed(1);
                const idx = allStudents.indexOf(s);
                let html = `<tr><td>${s.id}</td><td>${s.name}</td>`;
                s.marks.forEach((m, i) => {
                    html += `<td><input type="number" value="${m}" min="0" max="100" data-idx="${idx}" data-sub="${i}" style="width: 45px;"></td>`;
                });
                html += `<td style="font-weight: bold; background: #e8f4f8;">${total}</td><td style="font-weight: bold; background: #f0e8f8;">${avg}</td></tr>`;
                tbody.innerHTML += html;
            });
        }

        function saveTeacherMarks() {
            const inputs = document.querySelectorAll("#teacherMarksList input");
            inputs.forEach(inp => {
                const idx = parseInt(inp.getAttribute("data-idx"));
                const sub = parseInt(inp.getAttribute("data-sub"));
                allStudents[idx].marks[sub] = Math.min(100, Math.max(0, parseInt(inp.value) || 0));
            });
            saveStudents();
            loadTeacherMarks();
            showAlert("✅ Marks saved successfully!", "success", "teacher");
        }

        function loadTimetable() {
            const tbody = document.getElementById("timetableBody");
            tbody.innerHTML = "";
            timetable.forEach(p => {
                tbody.innerHTML += `<tr><td>${p.period}</td><td>${p.time}</td><td>${p.subject}</td><td>${p.room}</td></tr>`;
            });
        }

        function updateTeacherDashboard() {
            const cls = document.getElementById("teacherClassSelect").value;
            if (!cls) {
                document.getElementById("teacherStats").innerHTML = "<p style='text-align: center; color: #999;'>Please select a class first</p>";
                return;
            }

            const classStudents = allStudents.filter(s => s.class == cls);
            if (classStudents.length === 0) {
                document.getElementById("teacherStats").innerHTML = "<p style='text-align: center; color: #999;'>No students in this class</p>";
                return;
            }

            const total = classStudents.reduce((sum, s) => sum + s.marks.reduce((a, b) => a + b, 0), 0);
            const avg = classStudents.length > 0 ? (total / (classStudents.length * 7)).toFixed(1) : 0;
            const passed = classStudents.filter(s => s.marks.reduce((a, b) => a + b) >= 50).length;

            let html = `
                <div class="stat-card"><div class="stat-number">${classStudents.length}</div><div class="stat-label">Total Students</div></div>
                <div class="stat-card"><div class="stat-number">${avg}</div><div class="stat-label">Class Average</div></div>
                <div class="stat-card"><div class="stat-number">${passed}</div><div class="stat-label">Passed</div></div>
                <div class="stat-card"><div class="stat-number">${classStudents.length - passed}</div><div class="stat-label">Failed</div></div>
            `;
            document.getElementById("teacherStats").innerHTML = html;
        }

        window.onload = () => {
            loadStudents();
            document.getElementById("teacherId").focus();
        };
    </script>
</body>
</html>
